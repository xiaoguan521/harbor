name: "Test ARM64 Build"
on: 
  workflow_dispatch:
   inputs:
    version:
      description: 'Test version'
      required: true
      default: '1.0'

jobs:
  BUILD_TEST:
    runs-on: ubuntu-20.04
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Verify Environment
        run: |
          echo "=== System Info ==="
          uname -a
          
          echo "=== QEMU Info ==="
          ls -l /proc/sys/fs/binfmt_misc/qemu*
          
          echo "=== Docker Info ==="
          docker buildx ls
          
          echo "=== Available Platforms ==="
          docker buildx inspect --bootstrap

      - name: Create test Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM --platform=linux/arm64 alpine:latest
          RUN uname -a > /arch.txt
          CMD cat /arch.txt
          EOF

      - name: Build and Test
        run: |
          # 构建镜像
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t arm64-test:${{ github.event.inputs.version }} \
            .
          
          # 验证镜像
          echo "=== Image Info ==="
          docker images arm64-test:${{ github.event.inputs.version }}
          
          echo "=== Architecture Info ==="
          docker inspect arm64-test:${{ github.event.inputs.version }} | grep -A 3 "Architecture"
          
          echo "=== Running Container Test ==="
          docker run --rm arm64-test:${{ github.event.inputs.version }}
