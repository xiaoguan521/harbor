name: "Test ARM64 Build"
on: 
  workflow_dispatch:
   inputs:
    version:
      description: 'Harbor version'
      required: true
      default: 'v2.12.0'

jobs:
  BUILD_TEST:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: ${{ github.event.inputs.version }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Build Harbor Core
        run: |
          # 只构建 harbor-core
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t goharbor/harbor-core:test \
            -f make/photon/core/Dockerfile .

      - name: Verify Architecture
        run: |
          echo "Checking harbor-core image:"
          docker inspect goharbor/harbor-core:test | grep -A 3 "Architecture"
