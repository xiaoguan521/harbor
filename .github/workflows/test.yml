name: "Test ARM64 Build"
on: 
  workflow_dispatch:
   inputs:
    version:
      description: 'Harbor version'
      required: true
      default: 'v2.12.0'

jobs:
  BUILD_TEST:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: ${{ github.event.inputs.version }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/arm64

      - name: Build Base Image
        run: |
          # 先构建基础镜像
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t goharbor/harbor-core-base:latest \
            -f make/photon/core/base/Dockerfile .

      - name: Build Harbor Core
        run: |
          # 构建 harbor-core
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t goharbor/harbor-core:test \
            -f make/photon/core/Dockerfile \
            --build-arg harbor_base_image_version=latest \
            --build-arg harbor_base_namespace=goharbor \
            .

      - name: Verify Architecture
        run: |
          echo "Checking base image:"
          docker inspect goharbor/harbor-core-base:latest | grep -A 3 "Architecture"
          
          echo "Checking harbor-core image:"
          docker inspect goharbor/harbor-core:test | grep -A 3 "Architecture"
