name: "ARM64 Build Test"
on: 
  workflow_dispatch:

jobs:
  BUILD_TEST:
    runs-on: ubuntu-20.04
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test ARM64 Build
        run: |
          # 拉取并检查 ARM64 镜像
          echo "=== Pull ARM64 Alpine ==="
          docker pull --platform linux/arm64 alpine:latest
          
          echo "=== Check Pulled Image ==="
          docker inspect alpine:latest | grep -A 3 "Architecture"
          
          # 创建简单测试
          cat > Dockerfile << 'EOF'
          FROM --platform=linux/arm64 alpine:latest
          RUN apk add --no-cache uname
          RUN uname -m > /arch.txt
          CMD cat /arch.txt
          EOF
          
          # 构建测试镜像
          echo "=== Building Test Image ==="
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --progress=plain \
            -t arm64test:latest \
            .
          
          echo "=== Check Built Image ==="
          docker images --format "{{.Repository}}:{{.Tag}} {{.Architecture}}"
          docker inspect arm64test:latest | grep -A 3 "Architecture"
          
          echo "=== Run Test Container ==="
          docker run --rm arm64test:latest

      - name: Additional Verification
        run: |
          echo "=== System Architecture ==="
          uname -m
          
          echo "=== Docker Info ==="
          docker version
          docker info
          
          echo "=== QEMU Status ==="
          ls -l /proc/sys/fs/binfmt_misc/qemu*
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64
