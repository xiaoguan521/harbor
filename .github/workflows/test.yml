name: "ARM64 Build Test"
on: 
  workflow_dispatch:

jobs:
  BUILD_TEST:
    runs-on: ubuntu-20.04
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test ARM64 Build
        run: |
          # 创建简单测试
          cat > Dockerfile << 'EOF'
          FROM --platform=linux/arm64 alpine:latest
          RUN uname -m > /arch.txt
          CMD cat /arch.txt
          EOF
          
          # 构建测试镜像
          echo "=== Building Test Image ==="
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --progress=plain \
            -t arm64test:latest \
            .
          
          echo "=== Check Built Image ==="
          echo "Docker Images:"
          docker images
          
          echo "Image Inspection:"
          docker inspect arm64test:latest | grep -A 3 '"Architecture"'
          
          echo "=== Run Test Container ==="
          docker run --rm arm64test:latest

      - name: Detailed Image Info
        run: |
          echo "=== Detailed Image Information ==="
          docker image inspect arm64test:latest --format '{{.Architecture}}'
          docker image inspect arm64test:latest --format '{{.Os}}'
          
          echo "=== Full Image Details ==="
          docker image inspect arm64test:latest
