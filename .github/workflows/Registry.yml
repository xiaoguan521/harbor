name: "Build Harbor Registry Components"
on: 
  workflow_dispatch:
    inputs:
      version:
        description: 'Harbor version (e.g., v2.2.2)'
        required: true
        default: 'v2.12.0'
      arch:
        description: 'Build architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - amd64

env:
  REGISTRY_VERSION: v2.8.1

jobs:
  BUILD_REGISTRY_COMPONENTS:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: ${{ github.event.inputs.version }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ github.event.inputs.arch }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/${{ github.event.inputs.arch }}
        
      - name: Initialize Docker Buildx
        run: |
          docker buildx create --use
          docker buildx inspect --bootstrap

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Download and Prepare Registry
        id: registry_prep
        run: |
          REGISTRY_DIR=/tmp/registry
          
          # 下载并解压 registry 源码
          mkdir -p ${REGISTRY_DIR}
          curl -L https://github.com/distribution/distribution/archive/refs/tags/${REGISTRY_VERSION}.tar.gz | tar xz -C ${REGISTRY_DIR}
          
          # 使用 GOPATH 模式编译
          export GOPATH=/tmp/go
          mkdir -p $GOPATH/src/github.com/distribution
          mv ${REGISTRY_DIR}/distribution-${REGISTRY_VERSION#v} $GOPATH/src/github.com/distribution/distribution
          cd $GOPATH/src/github.com/distribution/distribution
          GOARCH=${{ github.event.inputs.arch }} CGO_ENABLED=0 go build -o /tmp/registry ./cmd/registry
          
          # 创建必要的目录并复制文件
          mkdir -p make/photon/registry/binary/
          cp /tmp/registry make/photon/registry/binary/
          
          # 输出环境变量供后续步骤使用
          echo "registry_src=$GOPATH/src/github.com/distribution/distribution" >> "$GITHUB_OUTPUT"
          echo "registry_binary=/tmp/registry" >> "$GITHUB_OUTPUT"

      - name: Build Registry
        run: |
          echo "=== Building Registry Image ==="
          make -f make/photon/Makefile _build_registry \
            REGISTRY_SRC=${{ steps.registry_prep.outputs.registry_src }} \
            REGISTRY_VERSION=${REGISTRY_VERSION} \
            PLATFORM=linux/${{ github.event.inputs.arch }} \
            BUILDARCH=${{ github.event.inputs.arch }} \
            DOCKERBUILD="docker buildx build --platform linux/${{ github.event.inputs.arch }} --load" \
            DOCKERBUILD_WITH_PULL_PARA="docker buildx build --platform linux/${{ github.event.inputs.arch }} --load --pull" \
            BASEIMAGENAMESPACE=goharbor \
            BASEIMAGETAG=${{ github.event.inputs.version }} \
            VERSIONTAG=${{ github.event.inputs.version }} \
            PUSHFLAG=false

      - name: Compile Registryctl
        run: |
          echo "=== Compiling Registryctl ==="
          cd src/registryctl
          GOARCH=${{ github.event.inputs.arch }} CGO_ENABLED=0 go build -o ../../make/photon/registryctl/harbor_registryctl
          cd ../..

      - name: Build Registryctl
        run: |
          echo "=== Building Registryctl Image ==="
          make -f make/photon/Makefile _build_registryctl \
            PLATFORM=linux/${{ github.event.inputs.arch }} \
            BUILDARCH=${{ github.event.inputs.arch }} \
            DOCKERBUILD="docker buildx build --platform linux/${{ github.event.inputs.arch }} --load" \
            DOCKERBUILD_WITH_PULL_PARA="docker buildx build --platform linux/${{ github.event.inputs.arch }} --load --pull" \
            BASEIMAGENAMESPACE=goharbor \
            BASEIMAGETAG=${{ github.event.inputs.version }} \
            VERSIONTAG=${{ github.event.inputs.version }}

      - name: Verify Images
        run: |
          echo "=== Harbor Registry Images ==="
          docker images | grep "goharbor/.*registry"
          
          echo "=== Registry Image Architecture ==="
          docker inspect goharbor/registry-photon:${{ github.event.inputs.version }} | grep -A 3 '"Architecture"'
          
          echo "=== Registryctl Image Architecture ==="
          docker inspect goharbor/harbor-registryctl:${{ github.event.inputs.version }} | grep -A 3 '"Architecture"'
