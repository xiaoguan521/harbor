name: "Build Harbor Registry Components"
on: 
  workflow_dispatch:
    inputs:
      version:
        description: 'Harbor version (e.g., v2.2.2)'
        required: true
        default: 'v2.12.0'
      arch:
        description: 'Build architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - amd64

env:
  REGISTRY_VERSION: v2.8.3

jobs:
  BUILD_REGISTRY_COMPONENTS:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: ${{ github.event.inputs.version }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ github.event.inputs.arch }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/${{ github.event.inputs.arch }}
        
      - name: Initialize Docker Buildx
        run: |
          docker buildx create --use
          docker buildx inspect --bootstrap

      - name: Download Registry Binary
        run: |
          echo "=== Downloading Registry Binary ==="
          mkdir -p make/photon/registry/binary/
          curl -L https://github.com/distribution/distribution/releases/download/${REGISTRY_VERSION}/registry_${REGISTRY_VERSION#v}_linux_${{ github.event.inputs.arch }}.tar.gz | tar xz -C make/photon/registry/binary/ registry
          chmod +x make/photon/registry/binary/registry
          mv make/photon/registry/binary/registry make/photon/registry/binary/registry_DO_NOT_USE_GC

      - name: Build Registry
        run: |
          echo "=== Building Registry Image ==="
          cd make/photon/registry
          docker buildx build \
            --platform linux/${{ github.event.inputs.arch }} \
            --load \
            -f Dockerfile \
            -t goharbor/registry-photon:${{ github.event.inputs.version }} .

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Compile Registryctl
        run: |
          echo "=== Compiling Registryctl ==="
          cd src/registryctl
          GOARCH=${{ github.event.inputs.arch }} CGO_ENABLED=0 go build -o ../../make/photon/registryctl/harbor_registryctl
          cd ../..

      - name: Build Registryctl
        run: |
          echo "=== Building Registryctl Image ==="
          cd make/photon/registryctl
          docker buildx build \
            --platform linux/${{ github.event.inputs.arch }} \
            --load \
            -f Dockerfile \
            -t goharbor/harbor-registryctl:${{ github.event.inputs.version }} .

      - name: Verify Images
        run: |
          echo "=== Harbor Registry Images ==="
          docker images | grep "goharbor/.*registry"
          
          echo "=== Registry Image Architecture ==="
          docker inspect goharbor/registry-photon:${{ github.event.inputs.version }} | grep -A 3 '"Architecture"'
          
          echo "=== Registryctl Image Architecture ==="
          docker inspect goharbor/harbor-registryctl:${{ github.event.inputs.version }} | grep -A 3 '"Architecture"'
