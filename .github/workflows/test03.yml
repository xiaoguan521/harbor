name: "Build Harbor Prepare Base"
on: 
  workflow_dispatch:
    inputs:
      version:
        description: 'Harbor version (e.g., v2.2.2)'
        required: true
        default: 'v2.12.0'
      arch:
        description: 'Build architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - amd64

jobs:
  BUILD_PREPARE_BASE:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: ${{ github.event.inputs.version }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ github.event.inputs.arch }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/${{ github.event.inputs.arch }}
        
      - name: Initialize Docker Buildx
        run: |
          docker buildx create --use
          docker buildx inspect --bootstrap

      - name: Build Prepare Base Image
        run: |
          echo "=== Building Prepare Base Image ==="
          make -f make/photon/Makefile _build_prepare_base \
            PLATFORM=linux/${{ github.event.inputs.arch }} \
            BUILDARCH=${{ github.event.inputs.arch }} \
            DOCKERBUILD="docker buildx build --platform linux/${{ github.event.inputs.arch }} --load" \
            DOCKERBUILD_WITH_PULL_PARA="docker buildx build --platform linux/${{ github.event.inputs.arch }} --load --pull" \
            BASEIMAGENAMESPACE=goharbor \
            BASEIMAGETAG=${{ github.event.inputs.version }} \
            VERSIONTAG=${{ github.event.inputs.version }}

      - name: Verify Image
        run: |
          echo "=== Prepare Base Image Info ==="
          docker images | grep goharbor
          
          echo "=== Image Architecture ==="
          docker inspect goharbor/harbor-prepare-base:${{ github.event.inputs.version }} | grep -A 3 '"Architecture"'
