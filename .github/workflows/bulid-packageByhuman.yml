name: "Build Harbor Package by Human"
env:
  DOCKER_COMPOSE_VERSION: 1.29.2

on: 
  workflow_dispatch:
   inputs:
    version:
      description: 'Harbor version'
      required: true
      default: 'v2.12.0'
    arch:
      description: 'Build architecture'
      required: true
      default: 'arm64'
      type: choice
      options:
        - arm64
        - amd64

jobs:
  BUILD_PACKAGE:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: ${{ github.event.inputs.version }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Base Images
        run: |
          # 设置共同的构建参数
          COMMON_PARAMS="\
            PLATFORM=linux/arm64 \
            BUILDARCH=arm64 \
            DOCKERBUILD=\"docker buildx build --platform linux/arm64 --load\" \
            DOCKERBUILD_WITH_PULL_PARA=\"docker buildx build --platform linux/arm64 --load --pull\" \
            BASEIMAGENAMESPACE=goharbor \
            BASEIMAGETAG=${{ github.event.inputs.version }}"
          
          # 构建所有基础镜像
          echo "=== Building Base Images ==="
          components="prepare registry registryctl portal core jobservice proxy log db redis trivy exporter"
          for component in $components; do
            echo "Building ${component} base image..."
            make -f make/photon/Makefile _build_${component}_base $COMMON_PARAMS
          done

      - name: Build Component Images
        run: |
          # 设置共同的构建参数
          COMMON_PARAMS="\
            PLATFORM=linux/arm64 \
            BUILDARCH=arm64 \
            DOCKERBUILD=\"docker buildx build --platform linux/arm64 --load\" \
            DOCKERBUILD_WITH_PULL_PARA=\"docker buildx build --platform linux/arm64 --load --pull\" \
            BASEIMAGENAMESPACE=goharbor \
            BASEIMAGETAG=${{ github.event.inputs.version }} \
            VERSIONTAG=${{ github.event.inputs.version }}"
          
          # 构建所有组件镜像
          echo "=== Building Component Images ==="
          components="prepare registry registryctl portal core jobservice proxy log db redis trivy exporter"
          for component in $components; do
            echo "Building ${component} image..."
            make -f make/photon/Makefile _build_${component} $COMMON_PARAMS
          done

      - name: Package Offline Installer
        run: |
          # 构建离线包
          make package_offline GOBUILDTAGS="include_oss" \
            BASEIMAGETAG=${{ github.event.inputs.version }} \
            VERSIONTAG=${{ github.event.inputs.version }} \
            PKGVERSIONTAG=${{ github.event.inputs.version }} \
            BUILDARCH=${{ github.event.inputs.arch }} \
            PLATFORM=linux/arm64 \
            REGISTRYVERSION=v2.7.1 \
            NOTARYFLAG=false \
            CHARTFLAG=false \
            TRIVYFLAG=true \
            PULL_BASE_FROM_DOCKERHUB=false

      - name: Verify Images
        run: |
          echo "=== Checking All Images ==="
          docker images | grep goharbor
          
          echo "=== Verifying Image Architectures ==="
          for img in $(docker images --format "{{.Repository}}:{{.Tag}}" | grep "goharbor"); do
            echo "=== $img ==="
            docker inspect $img | grep -A 3 '"Architecture"'
          done

      - name: Upload Package
        uses: actions/upload-artifact@v3
        with:
          name: harbor-${{ github.event.inputs.arch }}-${{ github.event.inputs.version }}
          path: harbor*.tgz
          retention-days: 5
