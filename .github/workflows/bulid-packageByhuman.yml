name: "Build Harbor Package by Humam"
env:
  DOCKER_COMPOSE_VERSION: 1.29.2
on: 
  workflow_dispatch:
    inputs:
      version:
        description: 'Harbor version (e.g., v2.2.2)'
        required: true
        default: 'v2.12.0'
      ref_type:
        description: 'Reference type'
        required: true
        default: 'tag'
        type: choice
        options:
          - tag
          - branch
      arch:
        description: 'Build architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - amd64
jobs:
  BUILD_PACKAGE:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: v2.12.0
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Base Images
        run: |
          # 构建所有基础镜像
          echo "=== Building Base Images ==="
          components="prepare registry registryctl portal core jobservice proxy log db redis trivy exporter"
          for component in $components; do
            echo "Building ${component} base image..."
            make -f make/photon/Makefile _build_${component}_base \
              PLATFORM=linux/arm64 \
              BUILDARCH=arm64 \
              DOCKERBUILD="docker buildx build --platform linux/arm64 --load" \
              DOCKERBUILD_WITH_PULL_PARA="docker buildx build --platform linux/arm64 --load --pull" \
              BASEIMAGENAMESPACE=goharbor \
              BASEIMAGETAG=v2.12.0
          done

      - name: Build Component Images
        run: |
          # 构建所有组件镜像
          echo "=== Building Component Images ==="
          components="prepare registry registryctl portal core jobservice proxy log db redis trivy exporter"
          for component in $components; do
            echo "Building ${component} image..."
            make -f make/photon/Makefile _build_${component} \
              PLATFORM=linux/arm64 \
              BUILDARCH=arm64 \
              DOCKERBUILD="docker buildx build --platform linux/arm64 --load" \
              DOCKERBUILD_WITH_PULL_PARA="docker buildx build --platform linux/arm64 --load --pull" \
              BASEIMAGENAMESPACE=goharbor \
              BASEIMAGETAG=v2.12.0 \
              VERSIONTAG=v2.12.0
          done

      - name: Package Offline Installer
        run: |
          make package_offline \
            PLATFORM=linux/arm64 \
            BUILDARCH=arm64 \
            DOCKERBUILD="docker buildx build --platform linux/arm64 --load" \
            DOCKERBUILD_WITH_PULL_PARA="docker buildx build --platform linux/arm64 --load --pull" \
            GOBUILDTAGS="include_oss" \
            BASEIMAGETAG=v2.12.0 \
            VERSIONTAG=v2.12.0 \
            PKGVERSIONTAG=v2.12.0 \
            REGISTRYVERSION=v2.7.1 \
            NOTARYFLAG=false \
            CHARTFLAG=false \
            TRIVYFLAG=true \
            PULL_BASE_FROM_DOCKERHUB=false

      - name: Verify Images
        run: |
          echo "=== All Harbor Images ==="
          docker images | grep goharbor
          
          echo "=== Image Architectures ==="
          for img in $(docker images --format "{{.Repository}}:{{.Tag}}" | grep "goharbor"); do
            echo "=== $img ==="
            docker inspect $img | grep -A 3 '"Architecture"'
          done

      - name: Upload Package
        uses: actions/upload-artifact@v3
        with:
          name: harbor-arm64-v2.12.0
          path: harbor*.tgz
          retention-days: 5
