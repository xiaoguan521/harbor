name: "Build Package Workflow By Human"
env:
  DOCKER_COMPOSE_VERSION: 1.23.0

on: 
  workflow_dispatch:
   inputs:
    version:
      description: 'Harbor version (e.g., v2.2.2)'
      required: true
      default: 'v2.2.2'
    ref_type:
      description: 'Reference type'
      required: true
      default: 'tag'
      type: choice
      options:
        - tag
        - branch
    arch:
      description: 'Build architecture'
      required: true
      default: 'arm64'
      type: choice
      options:
        - arm64
        - amd64

jobs:
  BUILD_PACKAGE:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      
      # 检出指定版本的 Harbor 源码
      - name: Checkout Harbor source
        uses: actions/checkout@v3
        with:
          repository: goharbor/harbor
          ref: ${{ github.event.inputs.version }}
          path: src/github.com/goharbor/harbor
          fetch-depth: 0
          
      # 验证版本信息
      - name: Verify version
        run: |
          cd src/github.com/goharbor/harbor
          if [ "${{ github.event.inputs.ref_type }}" = "tag" ]; then
            git fetch --all --tags
            if ! git tag | grep -q "^${{ github.event.inputs.version }}$"; then
              echo "Tag ${{ github.event.inputs.version }} not found"
              exit 1
            fi
          fi
          echo "Building Harbor version: $(cat VERSION)"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.2
          
      - name: Setup Docker
        uses: docker-practice/actions-setup-docker@master
        with:
          docker_version: 20.10
          docker_channel: stable
       # 添加 docker-compose 安装步骤
      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/1.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      - name: Build Package
        env:
          TERM: xterm
        run: |
          set -x
          cd src/github.com/goharbor/harbor
          
          # 设置构建参数
          build_base_params=" BUILD_BASE=true PUSHBASEIMAGE=false"
          
          # 构建离线包
          sudo make package_offline GOBUILDTAGS="include_oss" \
            BASEIMAGETAG=dev \
            VERSIONTAG=${{ github.event.inputs.version }} \
            PKGVERSIONTAG=${{ github.event.inputs.version }} \
            BUILDARCH=${{ github.event.inputs.arch }} \
            ${build_base_params}
            
          # 构建在线包
          sudo make package_online GOBUILDTAGS="include_oss" \
            BASEIMAGETAG=dev \
            VERSIONTAG=${{ github.event.inputs.version }} \
            PKGVERSIONTAG=${{ github.event.inputs.version }} \
            BUILDARCH=${{ github.event.inputs.arch }} \
            ${build_base_params}

      - name: Check build results
        run: |
          cd src/github.com/goharbor/harbor
          ls -lh harbor-*.tgz
          docker images
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: harbor-packages-${{ github.event.inputs.arch }}
          path: |
            src/github.com/goharbor/harbor/harbor-offline-installer-*.tgz
            src/github.com/goharbor/harbor/harbor-online-installer-*.tgz
          retention-days: 5


